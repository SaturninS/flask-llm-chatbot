<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flask LLM Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #1e293b;
      display: flex;
      align-items: center;
      gap: 10px;
      background: #0f1117;
    }

    header h1 { font-size: 1rem; font-weight: 600; color: #f8fafc; }
    header span { font-size: 0.75rem; color: #64748b; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bubble-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }
    .bubble-row.user { flex-direction: row-reverse; }

    .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.7rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .avatar.bot  { background: #334155; color: #94a3b8; }
    .avatar.user { background: #4f46e5; color: #e0e7ff; }

    .bubble {
      max-width: 70%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .bubble.bot  {
      background: #1e293b;
      border-bottom-left-radius: 4px;
      color: #cbd5e1;
    }
    .bubble.user {
      background: #4f46e5;
      border-bottom-right-radius: 4px;
      color: #fff;
    }

    .bubble.streaming::after {
      content: "▋";
      animation: blink .6s step-start infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    #input-area {
      padding: 12px 16px;
      border-top: 1px solid #1e293b;
      display: flex;
      gap: 8px;
      background: #0f1117;
    }

    #user-input {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 0.9rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      line-height: 1.4;
      max-height: 140px;
      overflow-y: auto;
      transition: border-color .15s;
    }
    #user-input:focus { border-color: #4f46e5; }
    #user-input::placeholder { color: #475569; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: none;
      background: #4f46e5;
      color: #fff;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      align-self: flex-end;
      transition: background .15s, opacity .15s;
    }
    #send-btn:hover  { background: #4338ca; }
    #send-btn:disabled { opacity: .4; cursor: not-allowed; }
  </style>
</head>
<body>

<header>
  <div class="avatar bot">M</div>
  <div>
    <h1>ClawBot</h1>
    <span>mistral-large-latest</span>
  </div>
</header>

<div id="messages"></div>

<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="Envoyer un message…"></textarea>
  <button id="send-btn" title="Envoyer">&#9658;</button>
</div>

<script>
  const messagesEl = document.getElementById("messages");
  const inputEl    = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");

  // Conversation history sent back to the server
  const history = [];

  function addBubble(role) {
    const row = document.createElement("div");
    row.className = `bubble-row ${role}`;

    const av = document.createElement("div");
    av.className = `avatar ${role}`;
    av.textContent = role === "user" ? "V" : "M";

    const bubble = document.createElement("div");
    bubble.className = `bubble ${role}`;

    row.appendChild(av);
    row.appendChild(bubble);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = "";
    inputEl.style.height = "auto";
    sendBtn.disabled = true;

    // User bubble
    addBubble("user").textContent = text;

    // Bot bubble (streaming)
    const botBubble = addBubble("bot");
    botBubble.classList.add("streaming");
    let accumulated = "";

    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, messages: history }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = "";

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split("\n");
        buffer = lines.pop(); // keep incomplete line

        for (const line of lines) {
          if (!line.startsWith("data: ")) continue;
          const raw = line.slice(6).trim();
          if (raw === "[DONE]") break;
          try {
            const { token } = JSON.parse(raw);
            accumulated += token;
            botBubble.textContent = accumulated;
            messagesEl.scrollTop = messagesEl.scrollHeight;
          } catch { /* ignore malformed chunk */ }
        }
      }
    } catch (err) {
      botBubble.textContent = "Erreur : " + err.message;
    }

    botBubble.classList.remove("streaming");

    // Update history for next turn
    history.push({ role: "user",      content: text });
    history.push({ role: "assistant", content: accumulated });

    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener("click", send);

  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  // Auto-resize textarea
  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + "px";
  });
</script>

</body>
</html>
